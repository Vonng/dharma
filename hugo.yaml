baseURL: "https://dharma.vonng.com/"
languageCode: "zh-cn"
title: "赛博经藏"
defaultContentLanguage: zh
defaultContentLanguageInSubdir: false

enableRobotsTXT: true
hasCJKLanguage: true

caches:
  images:
    dir: :cacheDir/images

outputs:
  home: [HTML]
  page: [HTML]
  section: [HTML, RSS]

module:
  imports:
    - path: github.com/imfing/hextra

languages:
  zh:
    label: 简体中文
    locale: zh-CN
    weight: 1
    title: "赛博经藏"
    params:
      description: "赛博经藏，关于古老智慧与 AI Agent 的七重映射。"
    menu:
      main:
        - name: 宣言
          pageRef: /manifesto
          weight: 1
        - name: 搜索
          weight: 2
          params:
            type: search
        - name: 语言
          weight: 3
          params:
            type: language-switch
      sidebar:
        - identifier: author
          name: 作者：Vonng
          url: "https://vonng.com"
          weight: 10
  en:
    label: English
    locale: en-US
    weight: 2
    title: "Cyber Dharma"
    params:
      description: "Cyber Dharma maps ancient wisdom traditions to AI Agent engineering concepts."
    menu:
      main:
        - name: Manifesto
          pageRef: /manifesto
          weight: 1
        - name: Search
          weight: 2
          params:
            type: search
        - name: Language
          weight: 3
          params:
            type: language-switch
      sidebar:
        - identifier: author
          name: "Author: Vonng"
          url: "https://vonng.com/en/"
          weight: 10

markup:
  goldmark:
    renderer:
      unsafe: true
    extensions:
      footnote: true
      linkify: true
      table: true
      taskList: true
      typographer: true
    parser:
      attribute: true
      autoHeadingID: true
      autoHeadingIDType: github
  tableOfContents:
    startLevel: 2
    endLevel: 4

params:
  description: "赛博经藏，关于古老智慧与 AI Agent 的七重映射。"

  navbar:
    displayTitle: true
    displayLogo: true
    logo:
      path: /logo.svg
      dark: /logo.svg
      width: 24
      height: 24
    width: wide

  page:
    width: wide

  theme:
    default: system
    displayToggle: false

  footer:
    enable: false
    displayCopyright: false
    displayPoweredBy: false
    width: wide

  search:
    enable: true
    type: flexsearch
    flexsearch:
      index: content
      tokenize: forward

  editURL:
    enable: false

  toc:
    displayTags: false

  highlight:
    copy:
      enable: true
      display: hover
